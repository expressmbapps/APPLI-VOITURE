<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EXPRESS MB - WhatsApp Ready</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --whatsapp: #25D366; }
        body { font-family: sans-serif; background: var(--light); margin: 0; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #ddd; padding: 10px; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-grey { background: #7f8c8d; color: white; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .action-btn { width: 100%; background: var(--success); color: white; padding: 15px; font-size: 18px; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .key-item { border: 2px solid #eee; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; background: white; transition: 0.2s; }
        .key-item.selected { border-color: var(--success); background: #e8f8f0; transform: scale(1.02); }
        .key-item img { width: 100%; height: 120px; object-fit: contain; }
        
        .recap { background: #eef2f7; padding: 15px; border-left: 5px solid var(--secondary); margin-bottom: 20px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; }
    </style>
</head>
<body>

<header><h1>🔑 EXPRESS MB</h1></header>

<nav>
    <button class="btn-blue" onclick="changerPage('user')">📱 CLIENT</button>
    <button class="btn-grey" onclick="accesAdmin()">⚙️ ADMIN</button>
</nav>

<div class="container">
    <div id="page-user" class="page">
        <div class="card">
            <h2>Sélectionner la clé</h2>
            <select id="u-marque" onchange="majFamilles()"><option value="">-- Charger le catalogue --</option></select>
            <select id="u-famille" onchange="majPuces()" disabled></select>
            <select id="u-puce" onchange="majGrille()" disabled></select>

            <div id="u-grille-container" class="hidden">
                <p><b>4. Sélectionnez le modèle visuel :</b></p>
                <div id="grille-cles" class="key-grid"></div>
                <button class="action-btn" id="btn-valider" onclick="ouvrirFormulaire()" style="display:none">Démarrer l'intervention</button>
            </div>
        </div>
    </div>

    <div id="page-formulaire" class="page hidden">
        <div class="card">
            <button onclick="changerPage('user')" style="background:none; color:var(--secondary); padding:0; margin-bottom:15px; font-weight:bold; cursor:pointer;">⬅ Retour</button>
            <h2>Fiche d'intervention</h2>
            
            <div id="recap-cle" class="recap"></div>

            <label><b>Envoyer à quel technicien ?</b></label>
            <select id="f-tech">
                <option value="OLIVIER">OLIVIER</option>
                <option value="FRANCK">FRANCK</option>
            </select>

            <label><b>Type de mission :</b></label>
            <select id="f-mission">
                <option value="DOUBLE DE CLÉ">Double de clé</option>
                <option value="PERTE TOTALE">Perte totale</option>
            </select>

            <label><b>Nom du Client :</b></label>
            <input type="text" id="f-client" placeholder="Ex: M. Martin">

            <label><b>Immatriculation :</b></label>
            <input type="text" id="f-immat" placeholder="Ex: AB-123-CD">

            <label><b>Télephone du client :</b></label>
            <input type="text" id="f-Téléphone" placeholder="Ex: 06 01 02 03 04">

            <label><b>Notes (Adresse, détails...) :</b></label>
            <textarea id="f-notes" rows="3" placeholder="Informations supplémentaires..."></textarea>

            <button class="action-btn btn-whatsapp" onclick="envoyerWhatsApp()">📲 ENVOYER PAR WHATSAPP</button>
        </div>
    </div>

    <div id="page-admin" class="page hidden">
        <div class="card">
            <h2>Ajouter au Catalogue</h2>
            <input type="text" id="a-marque" placeholder="MARQUE">
            <select id="a-famille">
                <option value="PLIP">PLIP</option>
                <option value="MAIN LIBRE">MAIN LIBRE</option>
                <option value="CARTE">CARTE</option>
                <option value="NON PLIABLE">NON PLIABLE</option>
            </select>
            <input type="text" id="a-desc" placeholder="Modèle / Description">
            <input type="text" id="a-puce" placeholder="N° Puce">
            <input type="number" id="a-prix" placeholder="Prix (€)">
            <input type="file" id="a-photo" accept="image/*">
            <button class="action-btn" onclick="ajouterCle()">ENREGISTRER</button>
        </div>
        <div class="card">
            <h3>Catalogue</h3>
            <div id="liste-admin"></div>
            <button onclick="resetTotal()" style="color:#999; background:none; border:1px solid #ccc; margin-top:50px; padding:5px; font-size:10px; cursor:pointer">Réinitialisation totale</button>
        </div>
    </div>
</div>

<script>
    let catalogue = JSON.parse(localStorage.getItem('catalogue')) || [];
    let idChoisi = null;

    function accesAdmin() {
        if (prompt("Code d'accès Admin :") === "1234") changerPage('admin');
        else alert("Refusé.");
    }

    function changerPage(nom) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + nom).classList.remove('hidden');
        if(nom === 'user') initMarques();
        if(nom === 'admin') initTableAdmin();
    }

    // --- LOGIQUE SELECTION ---
    function initMarques() {
        const sel = document.getElementById('u-marque');
        const marques = [...new Set(catalogue.map(c => c.marque))].sort();
        sel.innerHTML = '<option value="">-- Choisir Marque --</option>' + 
                        marques.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function majFamilles() {
        const m = document.getElementById('u-marque').value;
        const sel = document.getElementById('u-famille');
        const familles = [...new Set(catalogue.filter(c => c.marque === m).map(c => c.famille))].sort();
        sel.innerHTML = '<option value="">-- Type --</option>' + familles.map(f => `<option value="${f}">${f}</option>`).join('');
        sel.disabled = false;
        resetCascade(['u-puce']);
    }

    function majPuces() {
        const m = document.getElementById('u-marque').value;
        const f = document.getElementById('u-famille').value;
        const sel = document.getElementById('u-puce');
        const puces = [...new Set(catalogue.filter(c => c.marque === m && c.famille === f).map(c => c.puce))].sort();
        sel.innerHTML = '<option value="">-- Puce --</option>' + puces.map(p => `<option value="${p}">${p}</option>`).join('');
        sel.disabled = false;
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    function majGrille() {
        const m = document.getElementById('u-marque').value;
        const f = document.getElementById('u-famille').value;
        const p = document.getElementById('u-puce').value;
        const grille = document.getElementById('grille-cles');
        const cles = catalogue.filter(c => c.marque === m && c.famille === f && c.puce === p);
        grille.innerHTML = cles.map(c => `<div class="key-item" onclick="select(this, ${c.id})"><img src="${c.photo}"><div><b>${c.desc}</b></div><div>${c.prix}€</div></div>`).join('');
        document.getElementById('u-grille-container').classList.remove('hidden');
    }

    function select(el, id) {
        document.querySelectorAll('.key-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        idChoisi = id;
        document.getElementById('btn-valider').style.display = 'block';
    }

    function ouvrirFormulaire() {
        const c = catalogue.find(x => x.id === idChoisi);
        document.getElementById('recap-cle').innerHTML = `<strong>Modèle sélectionné :</strong> ${c.marque} ${c.desc}<br><strong>Puce :</strong> ${c.puce} | <strong>Prix :</strong> ${c.prix}€`;
        changerPage('formulaire');
    }

    // --- ENVOI WHATSAPP ---
    function envoyerWhatsApp() {
        const c = catalogue.find(x => x.id === idChoisi);
        const client = document.getElementById('f-client').value;
        const Téléphone = document.getElementById('f-Téléphone').value;
        const immat = document.getElementById('f-immat').value;
        const tech = document.getElementById('f-tech').value;
        const mission = document.getElementById('f-mission').value;
        const notes = document.getElementById('f-notes').value || "Aucune";

        if(!client || !immat) return alert("Veuillez remplir au moins le Client et l'Immat.");

        // CONFIGURATION DES NUMEROS (Mettre les vrais ici)
        const numeros = {
            "OLIVIER": "33600000000", // REMPLACE ICI
            "FRANCK": "33600000000"  // REMPLACE ICI
        };

        const numDestinataire = numeros[tech];

        // Formatage du message
        const texte = encodeURIComponent(
            `*🔑 EXPRESS MB - NOUVELLE MISSION*\n` +
            `------------------------------------\n` +
            `🛠 *MISSION :* ${mission}\n` +
            `🚗 *VÉHICULE :* ${c.marque} (${c.famille})\n` +
            `🔢 *IMMAT :* ${immat}\n` +
            `👤 *CLIENT :* ${client}\n` +
            `👤 *Téléphone :* ${Téléphone}\n` +
            `📟 *PUCE :* ${c.puce}\n` +
            `📦 *MODÈLE :* ${c.desc}\n` +
            `💵 *TARIF :* ${c.prix}€\n` +
            `📝 *NOTES :* ${notes}`
        );

        window.open(`https://wa.me/${numDestinataire}?text=${texte}`, '_blank');
        location.reload(); // Reset après envoi
    }

    // --- ADMIN ---
    function ajouterCle() {
        const m = document.getElementById('a-marque').value.trim().toUpperCase();
        const p = document.getElementById('a-prix').value;
        const f = document.getElementById('a-photo').files[0];
        if(!m || !p || !f) return alert("Champs obligatoires !");
        const r = new FileReader();
        r.onload = (e) => {
            catalogue.push({ id: Date.now(), marque: m, famille: document.getElementById('a-famille').value, desc: document.getElementById('a-desc').value, puce: document.getElementById('a-puce').value, prix: p, photo: e.target.result });
            localStorage.setItem('catalogue', JSON.stringify(catalogue));
            location.reload();
        };
        r.readAsDataURL(f);
    }

    function initTableAdmin() {
        const d = document.getElementById('liste-admin');
        d.innerHTML = "<table>" + catalogue.map(c => `<tr><td><img src="${c.photo}" class="img-mini"></td><td>${c.marque}</td><td><button onclick="suppr(${c.id})">❌</button></td></tr>`).join('') + "</table>";
    }

    function suppr(id) {
        if(confirm("Supprimer ?")) { catalogue = catalogue.filter(c => c.id !== id); localStorage.setItem('catalogue', JSON.stringify(catalogue)); initTableAdmin(); }
    }

    function resetTotal() {
        if (confirm("Vider tout ?") && prompt("Tapez : EFFACER") === "EFFACER") { localStorage.clear(); location.reload(); }
    }

    function resetCascade(ids) {
        ids.forEach(id => { document.getElementById(id).innerHTML = ""; document.getElementById(id).disabled = true; });
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    window.onload = initMarques;
</script>
</body>
</html>
