<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPRESS MB - Catalogue Cloud</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --whatsapp: #25D366; --akl: #e67e22; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #ddd; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-grey { background: #7f8c8d; color: white; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .action-btn { width: 100%; background: var(--success); color: white; padding: 15px; font-size: 18px; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        
        /* Grille des clés améliorée */
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .key-item { border: 2px solid #eee; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; background: white; position: relative; transition: 0.2s; }
        .key-item:hover { border-color: var(--secondary); }
        .key-item.selected { border-color: var(--success); background: #e8f8f0; transform: scale(1.02); }
        .key-item img { width: 100%; height: 110px; object-fit: contain; margin-bottom: 5px; }
        .price-tag { font-size: 0.85em; margin: 2px 0; }
        
        .recap { background: #eef2f7; padding: 15px; border-left: 5px solid var(--secondary); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        #loader { text-align: center; padding: 50px; font-size: 1.2em; color: var(--secondary); }
    </style>
</head>
<body>

<header><h1>🔑 EXPRESS MB</h1></header>

<nav>
    <button class="btn-blue" onclick="changerPage('user')">📱 COLLABORATEUR</button>
    <button class="btn-grey" onclick="accesAdmin()">⚙️ TECHNICIEN</button>
</nav>

<div class="container">
    <div id="loader">⏳ Chargement du catalogue Google...</div>

    <div id="page-user" class="page hidden">
        <div class="card">
            <h2>Trouver une clé</h2>
            <select id="u-marque" onchange="majFamilles()"><option value="">-- Choisir Marque --</option></select>
            <select id="u-type-cle" onchange="majPuces()" disabled><option value="">-- Type de clé --</option></select>
            <select id="u-type-puce" onchange="majGrille()" disabled><option value="">-- Type de puce --</option></select>

            <div id="u-grille-container" class="hidden">
                <div id="grille-cles" class="key-grid"></div>
                <button class="action-btn" id="btn-valider" onclick="ouvrirFormulaire()" style="display:none">Démarrer l'intervention</button>
            </div>
        </div>
    </div>

    <div id="page-formulaire" class="page hidden">
        <div class="card">
            <button onclick="changerPage('user')" style="background:none; color:var(--secondary); font-weight:bold; cursor:pointer; border:none;">⬅ Retour</button>
            <h2>Fiche d'intervention</h2>
            <div id="recap-cle" class="recap"></div>
            
            <select id="f-tech">
                <option value="OLIVIER">Technicien: OLIVIER</option>
                <option value="FRANCK">Technicien: FRANCK</option>
            </select>
            <select id="f-mission" onchange="majPrixRecap()">
                <option value="DOUBLE DE CLÉ">Double de clé</option>
                <option value="PERTE TOTALE">Perte totale (AKL)</option>
            </select>
            
            <input type="text" id="f-client" placeholder="Nom du Client">
            <input type="text" id="f-immat" placeholder="Immatriculation">
            <input type="text" id="f-tel" placeholder="Téléphone client">
            <textarea id="f-notes" rows="3" placeholder="Notes complémentaires..."></textarea>
            
            <button class="action-btn btn-whatsapp" onclick="envoyerWhatsApp()">📲 ENVOYER AU TECH</button>
        </div>
    </div>

    <div id="page-admin" class="page hidden">
        <div class="card">
            <h2 id="admin-form-title">Ajouter au Catalogue</h2>
            <input type="hidden" id="a-id">
            <input type="text" id="a-marque" placeholder="MARQUE (ex: RENAULT)">
            <input type="text" id="a-type-cle" placeholder="Type (ex: CARTE, PLIP...)">
            <input type="text" id="a-puce" placeholder="N° Puce (ex: ID46)">
            <input type="number" id="a-prix" placeholder="Prix Double (€)">
            <input type="number" id="a-prix-akl" placeholder="Prix AKL (€)">
            <textarea id="a-comm" placeholder="Commentaire technique"></textarea>

            <div style="background:#f9f9f9; padding:15px; border:2px dashed #ccc; text-align:center;">
                <input type="file" id="a-photo" accept="image/*" onchange="uploadPhoto(this)">
                <p id="upload-status">📸 Photo (optionnelle si modif)</p>
            </div>
            
            <button class="action-btn" id="btn-save" onclick="ajouterCleGoogle()">ENREGISTRER</button>
            <button class="action-btn btn-grey hidden" id="btn-cancel-edit" onclick="resetAdminForm()">ANNULER LA MODIFICATION</button>
        </div>

        <div class="card">
            <h3>Gestion du Stock / Edition</h3>
            <div id="liste-admin"></div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION (METS TES URL ICI) ---
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZGdihSRDaAkHM4hSWKWubhPkkVloL_FeyZcXW2ryPIbfxlGc-BIKUjU9OgbtJ7XIk/exec"; 
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dpxyoa6d5/image/upload";
    const UPLOAD_PRESET = "CATALOGUE"; 

    let catalogue = [];
    let idChoisi = null;
    let tempPhotoURL = null;

    // --- CHARGEMENT ---
   async function chargerDonnees() {
        try {
            const response = await fetch(SHEET_URL);
            catalogue = await response.json();
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('page-user').classList.remove('hidden');
            initMarques();
        } catch (e) { document.getElementById('loader').innerText = "❌ Erreur de chargement"; }
    }

    // --- NAVIGATION ---
    function changerPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-'+n).classList.remove('hidden');
        if(n === 'admin') initTableAdmin();
    }
    function accesAdmin() { if(prompt("Code:") === "1234") changerPage('admin'); }

    // --- LOGIQUE CLIENT ---
    function initMarques() {
        const sel = document.getElementById('u-marque');
        const marques = [...new Set(catalogue.map(c => c.marque.trim().toUpperCase()))].sort();
        sel.innerHTML = '<option value="">-- Choisir Marque --</option>' + 
                        marques.map(m => `<option value="${m}">${m}</option>`).join('');
    }

   function majFamilles() {
        const m = document.getElementById('u-marque').value;
        const sel = document.getElementById('u-type-cle');
        
        const types = [...new Set(catalogue
            .filter(c => String(c.marque || '').trim().toUpperCase() === String(m).trim().toUpperCase())
            .map(c => String(c.type_cle || '').trim())
        )].filter(Boolean).sort();
        
        sel.innerHTML = '<option value="">-- Type --</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
        sel.disabled = false;
        
        document.getElementById('u-type-puce').innerHTML = '<option value="">-- Puce --</option>';
        document.getElementById('u-type-puce').disabled = true;
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    function majPuces() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const sel = document.getElementById('u-type-puce');
        
        const puces = [...new Set(catalogue
            .filter(c => String(c.marque || '').trim().toUpperCase() === String(m).trim().toUpperCase() && String(c.type_cle || '').trim() === String(t).trim())
            .map(c => String(c.type_puce || '').trim())
        )].filter(Boolean).sort();
        
        sel.innerHTML = '<option value="">-- Puce --</option>' + puces.map(p => `<option value="${p}">${p}</option>`).join('');
        sel.disabled = false;
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    function majGrille() {
        const m = document.getElementById('u-marque').value.trim().toUpperCase();
        const t = document.getElementById('u-type-cle').value.trim().toUpperCase();
        const p = document.getElementById('u-type-puce').value.trim().toUpperCase();

        if(!m || !t || !p) return;

        // Filtrage ultra-sécurisé en convertissant tout en chaînes de caractères (String)
        const liste = catalogue.filter(c => {
            const marqueSheet = String(c.marque || '').trim().toUpperCase();
            const typeSheet = String(c.type_cle || '').trim().toUpperCase();
            const puceSheet = String(c.type_puce || '').trim().toUpperCase();
            return marqueSheet === m && typeSheet === t && puceSheet === p;
        });
        
        const grille = document.getElementById('grille-cles');
        
        if (liste.length === 0) {
            grille.innerHTML = '<p style="color:var(--danger); text-align:center; padding:10px; grid-column:1/-1;">⚠️ Aucune clé correspondante trouvée.</p>';
            document.getElementById('u-grille-container').classList.remove('hidden');
            return;
        }

        grille.innerHTML = liste.map(c => {
            const imageSrc = c.image ? c.image : 'https://via.placeholder.com/150?text=Pas+d+image';
            const prixDouble = c.prix ? c.prix + '€' : 'N/A';
            const prixAkl = c.prix_akl ? c.prix_akl + '€' : 'N/A';
            
            return `
                <div class="key-item" onclick="selectionnerCle('${c.id}', this)">
                    <img src="${imageSrc}">
                    <div class="price-tag"><b>Double:</b> <span style="color:var(--success)">${prixDouble}</span></div>
                    <div class="price-tag"><b>AKL:</b> <span style="color:var(--akl)">${prixAkl}</span></div>
                </div>`;
        }).join('');
        
        document.getElementById('u-grille-container').classList.remove('hidden');
    }
    function selectionnerCle(id, el) {
        idChoisi = id;
        document.querySelectorAll('.key-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn-valider').style.display = 'block';
    }

    // --- FORMULAIRE ET WHATSAPP ---
    function majPrixRecap() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        if(!cle) return;
        const typeMission = document.getElementById('f-mission').value;
        const prix = typeMission === "PERTE TOTALE" ? (cle.prix_akl || "Sur devis") : cle.prix;
        document.getElementById('recap-cle').innerHTML = `<b>${cle.marque}</b> - ${cle.type_cle}<br>Puce: ${cle.type_puce}<br>Tarif sélectionné: <b>${prix}€</b>`;
    }

    function ouvrirFormulaire() { majPrixRecap(); changerPage('formulaire'); }

    function envoyerWhatsApp() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        const mission = document.getElementById('f-mission').value;
        const prix = mission === "PERTE TOTALE" ? (cle.prix_akl || "S/D") : cle.prix;
        const tech = document.getElementById('f-tech').value;
        const tel = (tech === "OLIVIER") ? "33749504047" : "33666824460";
        const texte = `🚀 *MISSION - ${tech}*\n📍 *Type:* ${mission}\n👤 *Client:* ${document.getElementById('f-client').value}\n🚗 *Immat:* ${document.getElementById('f-immat').value}\n🔑 *Clé:* ${cle.marque} (${cle.type_cle})\n💰 *Prix:* ${prix}€\n🖼 *Photo:* ${cle.image}`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(texte)}`, '_blank');
    }

    // --- ADMIN ---
    async function uploadPhoto(input) {
        const file = input.files[0]; if(!file) return;
        document.getElementById('upload-status').innerText = "⏳ Envoi...";
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch(CLOUDINARY_URL, { method:'POST', body:fd }).then(r => r.json());
            tempPhotoURL = res.secure_url;
            document.getElementById('upload-status').innerText = "✅ OK";
        } catch(e) { alert("Erreur upload photo"); }
    }

    async function ajouterCleGoogle() {
        const btn = document.getElementById('btn-save');
        const idExistante = document.getElementById('a-id').value;
        btn.disabled = true;
        btn.innerText = "⏳ Enregistrement...";

        const data = {
            action: idExistante ? "update" : "add", // Si un ID existe, on dit au script de mettre à jour
            id: idExistante || "ID-"+Date.now(),
            marque: document.getElementById('a-marque').value.toUpperCase(),
            type_cle: document.getElementById('a-type-cle').value,
            type_puce: document.getElementById('a-puce').value,
            prix: document.getElementById('a-prix').value,
            prix_akl: document.getElementById('a-prix-akl').value,
            commentaire: document.getElementById('a-comm').value,
            image: tempPhotoURL
        };

        await fetch(SHEET_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(data)});
        alert("Action réussie !");
        location.reload();
    }

    function preparerModification(id) {
        const cle = catalogue.find(c => String(c.id) === String(id));
        if(!cle) return;

        document.getElementById('admin-form-title').innerText = "✏️ Modifier " + cle.marque;
        document.getElementById('a-id').value = cle.id;
        document.getElementById('a-marque').value = cle.marque;
        document.getElementById('a-type-cle').value = cle.type_cle;
        document.getElementById('a-puce').value = cle.type_puce;
        document.getElementById('a-prix').value = cle.prix;
        document.getElementById('a-prix-akl').value = cle.prix_akl;
        document.getElementById('a-comm').value = cle.commentaire;
        tempPhotoURL = cle.image;
        
        document.getElementById('btn-save').innerText = "METTRE À JOUR";
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetAdminForm() {
        document.getElementById('admin-form-title').innerText = "Ajouter au Catalogue";
        document.getElementById('a-id').value = "";
        document.getElementById('btn-save').innerText = "ENREGISTRER";
        document.getElementById('btn-cancel-edit').classList.add('hidden');
        document.getElementById('a-marque').value = "";
        tempPhotoURL = null;
    }

    async function supprimer(id) {
        if(!confirm("Supprimer définitivement cette clé ?")) return;
        await fetch(SHEET_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:"delete", id:id})});
        location.reload();
    }

    function initTableAdmin() {
        document.getElementById('liste-admin').innerHTML = '<table>' + catalogue.map(c => `
            <tr>
                <td><img src="${c.image}" class="img-mini"></td>
                <td><b>${c.marque}</b><br><small>${c.type_cle}</small></td>
                <td style="text-align:right">
                    <button onclick="preparerModification('${c.id}')" style="background:var(--secondary); color:white; margin-right:5px">✏️</button>
                    <button onclick="supprimer('${c.id}')" style="background:var(--danger); color:white">X</button>
                </td>
            </tr>`).join('') + '</table>';
    }

    window.onload = chargerDonnees;
</script>
</body>
</html>
