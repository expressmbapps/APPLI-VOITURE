<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPRESS MB - Catalogue</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --whatsapp: #25D366; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #ddd; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .action-btn { width: 100%; background: var(--success); color: white; padding: 15px; font-size: 18px; margin-top: 10px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .key-item { border: 2px solid #eee; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; background: white; }
        .key-item.selected { border-color: var(--success); background: #e8f8f0; }
        .key-item img { width: 100%; height: 100px; object-fit: contain; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        .img-mini { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<header><h1>🔑 EXPRESS MB</h1></header>

<nav>
    <button style="background:var(--secondary); color:white;" onclick="changerPage('user')">📱 COLLABORATEUR</button>
    <button style="background:#7f8c8d; color:white;" onclick="accesAdmin()">⚙️ ADMIN</button>
</nav>

<div class="container">
    <div id="loader">⏳ Chargement du catalogue...</div>

    <div id="page-user" class="page hidden">
        <div class="card">
            <h2>Recherche de clé</h2>
            <select id="u-marque" onchange="majTypes()"><option value="">-- Choisir Marque --</option></select>
            <select id="u-type-cle" onchange="majPuces()" disabled><option value="">-- Type --</option></select>
            <select id="u-type-puce" onchange="majGrille()" disabled><option value="">-- Puce --</option></select>

            <div id="u-grille-container" class="hidden">
                <hr><p><b>Modèles disponibles :</b></p>
                <div id="grille-cles" class="key-grid"></div>
                <button class="action-btn" id="btn-valider" onclick="ouvrirFormulaire()" style="display:none">DÉMARRER L'INTERVENTION</button>
            </div>
        </div>
    </div>

    <div id="page-formulaire" class="page hidden">
        <div class="card">
            <button onclick="changerPage('user')" style="background:none; color:var(--secondary); font-weight:bold; margin-bottom:10px;">⬅ Retour</button>
            <h2>Intervention</h2>
            <div id="recap-cle" style="background:#f0f4f8; padding:10px; border-radius:5px; margin-bottom:15px;"></div>

            <select id="f-mission" onchange="actualiserPrix()">
                <option value="DOUBLE DE CLÉ">Double de clé</option>
                <option value="PERTE TOTALE">Perte totale (AKL)</option>
            </select>
            <select id="f-tech">
                <option value="OLIVIER">OLIVIER</option>
                <option value="FRANCK">FRANCK</option>
            </select>
            <input type="text" id="f-client" placeholder="Nom du Client">
            <input type="text" id="f-immat" placeholder="Immatriculation">
            <textarea id="f-notes" placeholder="Notes..."></textarea>
            
            <button class="action-btn btn-whatsapp" onclick="envoyerWhatsApp()">📲 ENVOYER WHATSAPP</button>
        </div>
    </div>

    <div id="page-admin" class="page hidden">
        <div class="card">
            <h2 id="admin-title">Ajouter une clé</h2>
            <input type="text" id="a-marque" placeholder="MARQUE">
            <input type="text" id="a-type" placeholder="TYPE (PLIP, CARTE...)">
            <input type="text" id="a-puce" placeholder="N° PUCE">
            <input type="number" id="a-prix" placeholder="PRIX DOUBLE (€)">
            <input type="number" id="a-prix-akl" placeholder="PRIX AKL (€)">
            
            <label><b>Photo :</b></label>
            <input type="file" accept="image/*" onchange="uploadPhoto(this)">
            <p id="up-status" style="font-weight:bold; color:var(--secondary);">📸 Aucune photo</p>

            <button class="action-btn" id="btn-save-admin" onclick="saveCle()">ENREGISTRER</button>
            <button id="btn-cancel-edit" class="hidden" onclick="cancelEdit()" style="width:100%; margin-top:5px;">Annuler modification</button>
        </div>

        <div class="card">
            <h3>Liste du catalogue</h3>
            <div id="liste-admin"></div>
        </div>
    </div>
</div>

<script>
    // === CONFIGURATION ===
    const SHEET_URL = "https://script.google.com/macros/s/AKfycby39clXy6A00F6Y1T3-868EjZUgxYV9B8oRVGoReKK86YN2r1yo52bLXj6V_y5MLjE/exec"; 
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dpxyoa6d5/image/upload"; 
    const PRESET = "CATALOGUE";
    // =====================

    let catalogue = [];
    let idChoisi = null;
    let tempURL = null;
    let modeEdition = false;

    // CHARGEMENT
    async function chargerDonnees() {
        try {
            const res = await fetch(SHEET_URL);
            const raw = await res.json();
            // Nettoyage des clés (minuscules, pas d'espaces)
            catalogue = raw.map(item => {
                let n = {};
                for (let k in item) { n[k.toLowerCase().trim().replace(/[- ]/g, "_")] = item[k]; }
                return n;
            });
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('page-user').classList.remove('hidden');
            initMarques();
        } catch (e) { document.getElementById('loader').innerText = "❌ Erreur de catalogue"; }
    }

    function changerPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
        document.getElementById('page-'+p).classList.remove('hidden');
        if(p === 'admin') initTableAdmin();
    }

    function accesAdmin() { if(prompt("Code accès :") === "1234") changerPage('admin'); }

    // FILTRAGE CLIENT
    function initMarques() {
        const m = [...new Set(catalogue.map(c => c.marque))].filter(x => x).sort();
        document.getElementById('u-marque').innerHTML = '<option value="">-- Choisir Marque --</option>' + m.map(x => `<option value="${x}">${x}</option>`).join('');
    }

    function majTypes() {
        const m = document.getElementById('u-marque').value;
        const t = [...new Set(catalogue.filter(c => c.marque === m).map(c => c.type_cle))].filter(x => x).sort();
        const s = document.getElementById('u-type-cle');
        s.innerHTML = '<option value="">-- Type --</option>' + t.map(x => `<option value="${x}">${x}</option>`).join('');
        s.disabled = false;
    }

    function majPuces() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const p = [...new Set(catalogue.filter(c => c.marque === m && c.type_cle === t).map(c => c.type_puce))].filter(x => x).sort();
        const s = document.getElementById('u-type-puce');
        s.innerHTML = '<option value="">-- Puce --</option>' + p.map(x => `<option value="${x}">${x}</option>`).join('');
        s.disabled = false;
    }

    function majGrille() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const p = document.getElementById('u-type-puce').value;
        if(!p) return;

        const resultats = catalogue.filter(c => 
            String(c.marque).trim() === String(m).trim() && 
            String(c.type_cle).trim() === String(t).trim() && 
            String(c.type_puce).trim() === String(p).trim()
        );

        const container = document.getElementById('grille-cles');
container.innerHTML = resultats.map(c => `
    <div class="key-item" onclick="selectionnerCle('${c.id}', this)">
        <img src="${c.image || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
        <p>
            <b>PRIX : ${c.prix}</b>
            <br>
            <small>${c.prix_akl}</small>
        </p>
    </div>`).join('');
document.getElementById('u-grille-container').classList.remove('hidden');
document.getElementById('btn-valider').style.display = 'none';

    function selectionnerCle(id, el) {
        idChoisi = id;
        document.querySelectorAll('.key-item').forEach(k => k.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn-valider').style.display = 'block';
    }

    // FORMULAIRE & WHATSAPP
    function actualiserPrix() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        const type = document.getElementById('f-mission').value;
        const px = (type === "DOUBLE DE CLÉ") ? cle.prix : cle.prix_akl;
        document.getElementById('recap-cle').innerHTML = `<b>${cle.marque} ${cle.type_cle}</b><br>Prix : ${px} €`;
    }

    function ouvrirFormulaire() { actualiserPrix(); changerPage('formulaire'); }

    function envoyerWhatsApp() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        const tech = document.getElementById('f-tech').value;
        const miss = document.getElementById('f-mission').value;
        const px = (miss === "DOUBLE DE CLÉ") ? cle.prix : cle.prix_akl;
        const num = (tech === "OLIVIER") ? "33749504047" : "33666824460"; // METTRE VRAIS NUMS

        const msg = `🚀 *MISSION EXPRESS MB*\n\n` +
                    `📍 *MISSION :* ${miss}\n` +
                    `👤 *CLIENT :* ${document.getElementById('f-client').value}\n` +
                    `🚗 *IMMAT :* ${document.getElementById('f-immat').value}\n` +
                    `🔑 *CLE :* ${cle.marque} ${cle.type_cle}\n` +
                    `💰 *PRIX :* ${px}€\n\n` +
                    `📸 *PHOTO :* ${cle.image}`;
        
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // ADMIN
    async function uploadPhoto(input) {
        if (!input.files[0]) return;
        document.getElementById('up-status').innerText = "⏳ Upload...";
        const fd = new FormData();
        fd.append('file', input.files[0]);
        fd.append('upload_preset', PRESET);
        try {
            const r = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const d = await r.json();
            tempURL = d.secure_url;
            document.getElementById('up-status').innerText = "✅ Photo prête";
        } catch (e) { document.getElementById('up-status').innerText = "❌ Erreur"; }
    }

    async function saveCle() {
        const btn = document.getElementById('btn-save-admin');
        btn.disabled = true;
        btn.innerText = "⏳ Envoi...";

        const data = {
            action: modeEdition ? "update" : "add",
            id: modeEdition ? idChoisi : "ID-" + Date.now(),
            marque: document.getElementById('a-marque').value.toUpperCase().trim(),
            type_cle: document.getElementById('a-type').value.trim(),
            type_puce: document.getElementById('a-puce').value.trim(),
            prix: document.getElementById('a-prix').value,
            prix_akl: document.getElementById('a-prix-akl').value,
            image: tempURL || ""
        };

        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Succès !");
        location.reload();
    }

    function initTableAdmin() {
        const div = document.getElementById('liste-admin');
        div.innerHTML = `<table><tr><th>Photo</th><th>Clé</th><th>Action</th></tr>` + 
            catalogue.map(c => `<tr>
                <td><img src="${c.image}" class="img-mini"></td>
                <td>${c.marque}<br>${c.type_cle}</td>
                <td>
                    <button onclick="chargerEdit('${c.id}')">✏️</button>
                    <button onclick="deleteCle('${c.id}')" style="background:var(--danger); color:white;">❌</button>
                </td>
            </tr>`).join('') + `</table>`;
    }

    function chargerEdit(id) {
        const c = catalogue.find(x => String(x.id) === String(id));
        idChoisi = c.id;
        modeEdition = true;
        tempURL = c.image;
        document.getElementById('a-marque').value = c.marque;
        document.getElementById('a-type').value = c.type_cle;
        document.getElementById('a-puce').value = c.type_puce;
        document.getElementById('a-prix').value = c.prix;
        document.getElementById('a-prix-akl').value = c.prix_akl;
        document.getElementById('admin-title').innerText = "Modifier la clé";
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function deleteCle(id) {
        if(!confirm("Supprimer ?")) return;
        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"delete", id:id}) });
        location.reload();
    }

    window.onload = chargerDonnees;
</script>
</body>
</html>
