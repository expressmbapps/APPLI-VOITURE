<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPRESS MB - Catalogue</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --akl: #e67e22; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #ddd; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .action-btn { width: 100%; background: var(--success); color: white; padding: 15px; font-size: 18px; margin-top: 10px; }
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .key-item { border: 2px solid #eee; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; background: white; }
        .key-item.selected { border-color: var(--success); background: #e8f8f0; }
        .key-item img { width: 100%; height: 110px; object-fit: contain; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header><h1>🔑 EXPRESS MB</h1></header>

<nav>
    <button style="background:var(--secondary); color:white;" onclick="changerPage('user')">📱 COLLABORATEUR</button>
    <button style="background:#7f8c8d; color:white;" onclick="accesAdmin()">⚙️ ADMIN</button>
</nav>

<div class="container">
    <div id="loader">⏳ Chargement...</div>

    <div id="page-user" class="page hidden">
        <div class="card">
            <h2>Trouver une clé</h2>
            <select id="u-marque" onchange="majFamilles()"><option value="">-- Choisir Marque --</option></select>
            <select id="u-type-cle" onchange="majPuces()" disabled><option value="">-- Type de clé --</option></select>
            <select id="u-type-puce" onchange="majGrille()" disabled><option value="">-- Type de puce --</option></select>

            <div id="u-grille-container" class="hidden">
                <div id="grille-cles" class="key-grid"></div>
                <button class="action-btn" id="btn-valider" onclick="ouvrirFormulaire()" style="display:none">Démarrer l'intervention</button>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page hidden">
        <div class="card">
            <h2 id="admin-title">Ajouter une clé</h2>
            <input type="hidden" id="a-id">
            <input type="text" id="a-marque" placeholder="MARQUE">
            <input type="text" id="a-type-cle" placeholder="Type (CARTE, PLIP...)">
            <input type="text" id="a-puce" placeholder="Puce (ID46...)">
            <input type="number" id="a-prix" placeholder="Prix Double (€)">
            <input type="number" id="a-prix-akl" placeholder="Prix AKL (€)">
            <textarea id="a-comm" placeholder="Notes"></textarea>
            <input type="file" onchange="uploadPhoto(this)">
            <p id="up-status">📸 Photo requise</p>
            <button class="action-btn" id="btn-save" onclick="saveCle()">ENREGISTRER</button>
            <button onclick="resetAdminForm()" class="hidden" id="btn-cancel" style="width:100%; margin-top:5px;">Annuler</button>
        </div>
        <div class="card"><div id="liste-admin"></div></div>
    </div>
</div>

<script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZGdihSRDaAkHM4hSWKWubhPkkVloL_FeyZcXW2ryPIbfxlGc-BIKUjU9OgbtJ7XIk/exec"; // <--- METS TON URL ICI
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dpxyoa6d5/image/upload"; // <--- ET ICI
    const PRESET = "CATALOGUE";

    let catalogue = [];
    let idChoisi = null;
    let tempURL = null;

    async function chargerDonnees() {
        const res = await fetch(SHEET_URL);
        catalogue = await res.json();
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('page-user').classList.remove('hidden');
        const sel = document.getElementById('u-marque');
        const marques = [...new Set(catalogue.map(c => c.marque))].sort();
        sel.innerHTML = '<option value="">-- Marque --</option>' + marques.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function changerPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
        document.getElementById('page-'+p).classList.remove('hidden');
        if(p === 'admin') initAdmin();
    }

    function accesAdmin() { if(prompt("Code:") === "1234") changerPage('admin'); }

    // FILTRES INTERVENTION
    function majFamilles() {
        const m = document.getElementById('u-marque').value;
        const types = [...new Set(catalogue.filter(c => c.marque === m).map(c => c.type_cle))];
        const sel = document.getElementById('u-type-cle');
        sel.innerHTML = '<option value="">-- Type --</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
        sel.disabled = false;
        document.getElementById('u-type-puce').disabled = true;
    }

    function majPuces() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const puces = [...new Set(catalogue.filter(c => c.marque === m && c.type_cle === t).map(c => c.type_puce))];
        const sel = document.getElementById('u-type-puce');
        sel.innerHTML = '<option value="">-- Puce --</option>' + puces.map(p => `<option value="${p}">${p}</option>`).join('');
        sel.disabled = false;
    }

    function majGrille() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const p = document.getElementById('u-type-puce').value;
        const liste = catalogue.filter(c => c.marque === m && c.type_cle === t && c.type_puce === p);
        document.getElementById('grille-cles').innerHTML = liste.map(c => `
            <div class="key-item" onclick="idChoisi='${c.id}'; this.parentElement.querySelectorAll('.key-item').forEach(i=>i.classList.remove('selected')); this.classList.add('selected'); document.getElementById('btn-valider').style.display='block'">
                <img src="${c.image || ''}">
                <p>Double: ${c.prix}€<br>AKL: ${c.prix_akl}€</p>
            </div>`).join('');
        document.getElementById('u-grille-container').classList.remove('hidden');
    }

    // ADMIN
    async function uploadPhoto(input) {
        document.getElementById('up-status').innerText = "⏳...";
        const fd = new FormData(); fd.append('file', input.files[0]); fd.append('upload_preset', PRESET);
        const res = await fetch(https://api.cloudinary.com/v1_1/dpxyoa6d5/image/upload   , {method:'POST', body:fd}).then(r => r.json());
        tempURL = res.secure_url;
        document.getElementById('up-status').innerText = "✅ OK";
    }

    async function saveCle() {
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        const data = {
            action: document.getElementById('a-id').value ? "update" : "add",
            id: document.getElementById('a-id').value || "ID-"+Date.now(),
            marque: document.getElementById('a-marque').value,
            type_cle: document.getElementById('a-type-cle').value,
            type_puce: document.getElementById('a-puce').value,
            prix: document.getElementById('a-prix').value,
            prix_akl: document.getElementById('a-prix-akl').value,
            commentaire: document.getElementById('a-comm').value,
            image: tempURL
        };
        await fetch(SHEET_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(data)});
        location.reload();
    }

    function initAdmin() {
        document.getElementById('liste-admin').innerHTML = '<table>' + catalogue.map(c => `
            <tr>
                <td><img src="${c.image}" class="img-mini"></td>
                <td>${c.marque}</td>
                <td>
                    <button onclick="editForm('${c.id}')">✏️</button>
                    <button onclick="deleteCle('${c.id}')" style="background:var(--danger); color:white;">X</button>
                </td>
            </tr>`).join('') + '</table>';
    }

    function editForm(id) {
        const c = catalogue.find(i => i.id == id);
        document.getElementById('a-id').value = c.id;
        document.getElementById('a-marque').value = c.marque;
        document.getElementById('a-type-cle').value = c.type_cle;
        document.getElementById('a-puce').value = c.type_puce;
        document.getElementById('a-prix').value = c.prix;
        document.getElementById('a-prix-akl').value = c.prix_akl;
        document.getElementById('a-comm').value = c.commentaire;
        tempURL = c.image;
        document.getElementById('admin-title').innerText = "Modifier clé";
        document.getElementById('btn-cancel').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    async function deleteCle(id) {
        if(confirm("Supprimer ?")) {
            await fetch(SHEET_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({action:"delete", id:id})});
            location.reload();
        }
    }

    function resetAdminForm() { location.reload(); }

    window.onload = chargerDonnees;
</script>
</body>
</html>
