<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPRESS MB - Catalogue & WhatsApp</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --whatsapp: #25D366; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: center; background: #ddd; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .action-btn { width: 100%; background: var(--success); color: white; padding: 15px; font-size: 18px; margin-top: 10px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; }
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .key-item { border: 2px solid #eee; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; background: white; transition: 0.2s; }
        .key-item.selected { border-color: var(--success); background: #e8f8f0; transform: scale(1.02); }
        .key-item img { width: 100%; height: 110px; object-fit: contain; }
        .recap { background: #eef2f7; padding: 15px; border-left: 5px solid var(--secondary); margin-bottom: 20px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; }
    </style>
</head>
<body>

<header><h1>🔑 EXPRESS MB</h1></header>

<nav>
    <button style="background:var(--secondary); color:white;" onclick="changerPage('user')">📱 CLIENT</button>
    <button style="background:#7f8c8d; color:white;" onclick="accesAdmin()">⚙️ ADMIN</button>
</nav>

<div class="container">
    <div id="loader">⏳ Chargement du catalogue...</div>

    <div id="page-user" class="page hidden">
        <div class="card">
            <h2>Sélectionner la clé</h2>
            <select id="u-marque" onchange="majFamilles()"><option value="">-- Charger le catalogue --</option></select>
            <select id="u-type-cle" onchange="majPuces()" disabled></select>
            <select id="u-type-puce" onchange="majGrille()" disabled></select>

            <div id="u-grille-container" class="hidden">
                <hr><p><b>Sélectionnez le modèle visuel :</b></p>
                <div id="grille-cles" class="key-grid"></div>
                <button class="action-btn" id="btn-valider" onclick="ouvrirFormulaire()" style="display:none">Démarrer l'intervention</button>
            </div>
        </div>
    </div>

    <div id="page-formulaire" class="page hidden">
        <div class="card">
            <button onclick="changerPage('user')" style="background:none; color:var(--secondary); padding:0; margin-bottom:15px; font-weight:bold;">⬅ Retour</button>
            <h2>Fiche d'intervention</h2>
            <div id="recap-cle" class="recap"></div>

            <label><b>Type de mission :</b></label>
            <select id="f-mission" onchange="actualiserPrixRecap()">
                <option value="DOUBLE DE CLÉ">Double de clé</option>
                <option value="PERTE TOTALE">Perte totale (AKL)</option>
            </select>

            <label><b>Envoyer à quel technicien ?</b></label>
            <select id="f-tech">
                <option value="OLIVIER">OLIVIER</option>
                <option value="FRANCK">FRANCK</option>
            </select>

            <label><b>Nom du Client :</b></label>
            <input type="text" id="f-client" placeholder="Ex: M. Martin">
            <label><b>Immatriculation :</b></label>
            <input type="text" id="f-immat" placeholder="Ex: AB-123-CD">
            <label><b>Téléphone du client :</b></label>
            <input type="text" id="f-tel" placeholder="Ex: 06 00 00 00 00">
            <label><b>Notes supplémentaires :</b></label>
            <textarea id="f-notes" rows="3" placeholder="Adresse, horaires..."></textarea>

            <button class="action-btn btn-whatsapp" onclick="envoyerWhatsApp()">📲 ENVOYER PAR WHATSAPP</button>
        </div>
    </div>

    <div id="page-admin" class="page hidden">
        <div class="card">
            <h2>Ajouter au Catalogue</h2>
            <input type="text" id="a-marque" placeholder="MARQUE">
            <input type="text" id="a-type" placeholder="TYPE (PLIP, CARTE...)">
            <input type="text" id="a-puce" placeholder="N° PUCE">
            <input type="number" id="a-prix" placeholder="PRIX DOUBLE (€)">
            <input type="number" id="a-prix-akl" placeholder="PRIX AKL (€)">
            <textarea id="a-comm" placeholder="Notes techniques..."></textarea>
            
            <label><b>Photo :</b></label>
            <input type="file" accept="image/*" onchange="uploadPhoto(this)">
            <p id="up-status">📸 Aucune photo chargée</p>

            <button class="action-btn" onclick="saveCle()">ENREGISTRER DANS LE CLOUD</button>
        </div>
        <div class="card">
            <h3>Aperçu du Catalogue</h3>
            <div id="liste-admin"></div>
        </div>
    </div>
</div>

<script>
    // ================= CONFIGURATION =================
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxZGdihSRDaAkHM4hSWKWubhPkkVloL_FeyZcXW2ryPIbfxlGc-BIKUjU9OgbtJ7XIk/exec"; 
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dpxyoa6d5/image/upload"; 
    const PRESET = "CATALOGUE";
    // =================================================

    let catalogue = [];
    let idChoisi = null;
    let tempURL = null;

    // Chargement initial
    async function chargerDonnees() {
        try {
            const res = await fetch(SHEET_URL);
            const rawData = await res.json();
            
            // Nettoyage et harmonisation des données
            catalogue = rawData.map(item => {
                let newItem = {};
                for (let key in item) {
                    let cleanKey = key.toLowerCase().replace("-", "_").trim();
                    let val = item[key];
                    // Si c'est du texte, on enlève les espaces inutiles
                    newItem[cleanKey] = (typeof val === 'string') ? val.trim() : val;
                }
                return newItem;
            });

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('page-user').classList.remove('hidden');
            initMarques();
        } catch (err) {
            console.error("Erreur de chargement:", err);
            document.getElementById('loader').innerText = "❌ Erreur de connexion au catalogue";
        }
    }

    // --- LOGIQUE DES MENUS DÉROULANTS (SANS DOUBLONS) ---

    function initMarques() {
        const sel = document.getElementById('u-marque');
        // On récupère les marques uniques
        const marques = [...new Set(catalogue.map(c => c.marque))].filter(m => m).sort();
        sel.innerHTML = '<option value="">-- Choisir Marque --</option>' + 
                        marques.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function majFamilles() {
        const m = document.getElementById('u-marque').value;
        const selType = document.getElementById('u-type-cle');
        const selPuce = document.getElementById('u-type-puce');
        
        if (!m) {
            selType.disabled = true;
            selPuce.disabled = true;
            return;
        }

        // On filtre les types de clés UNIQUES pour cette marque
        const types = [...new Set(catalogue
            .filter(c => c.marque === m)
            .map(c => c.type_cle))]
            .filter(t => t).sort();

        selType.innerHTML = '<option value="">-- Type de clé --</option>' + 
                            types.map(t => `<option value="${t}">${t}</option>`).join('');
        
        selType.disabled = false;
        selPuce.disabled = true;
        selPuce.innerHTML = '<option value="">-- Attente type --</option>';
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    function majPuces() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const selPuce = document.getElementById('u-type-puce');

        if (!t) {
            selPuce.disabled = true;
            return;
        }

        // On filtre les puces UNIQUES pour cette marque ET ce type
        const puces = [...new Set(catalogue
            .filter(c => c.marque === m && c.type_cle === t)
            .map(c => c.type_puce))]
            .filter(p => p).sort();

        selPuce.innerHTML = '<option value="">-- Type de puce --</option>' + 
                            puces.map(p => `<option value="${p}">${p}</option>`).join('');
        
        selPuce.disabled = false;
        document.getElementById('u-grille-container').classList.add('hidden');
    }

    // --- AFFICHAGE DE LA GRILLE FINALE ---

    function majGrille() {
        const m = document.getElementById('u-marque').value;
        const t = document.getElementById('u-type-cle').value;
        const p = document.getElementById('u-type-puce').value;

        if (!p) return;

        // Filtrage strict pour l'affichage des modèles
        const liste = catalogue.filter(c => 
            c.marque === m && 
            c.type_cle === t && 
            c.type_puce === p
        );

        const container = document.getElementById('grille-cles');
        
        if (liste.length === 0) {
            container.innerHTML = "<p>Aucun modèle visuel trouvé.</p>";
        } else {
            container.innerHTML = liste.map(c => `
                <div class="key-item" onclick="selectionnerCle('${c.id}', this)">
                    <img src="${c.image || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                    <p><b>${c.type_cle}</b><br>Réf: ${c.id.toString().substring(0,8)}</p>
                </div>`).join('');
        }
        
        document.getElementById('u-grille-container').classList.remove('hidden');
        document.getElementById('btn-valider').style.display = 'none'; // Cacher le bouton jusqu'à sélection
    }

    // --- LE RESTE DES FONCTIONS (NAVIGATION, WHATSAPP, ADMIN) RESTE IDENTIQUE ---

    function changerPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.add('hidden'));
        document.getElementById('page-'+p).classList.remove('hidden');
        if(p === 'admin') initTableAdmin();
    }

    function accesAdmin() { if(prompt("Code:") === "1234") changerPage('admin'); }

    function selectionnerCle(id, el) {
        idChoisi = id;
        document.querySelectorAll('.key-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn-valider').style.display = 'block';
    }

    function actualiserPrixRecap() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        const mission = document.getElementById('f-mission').value;
        const prix = (mission === "DOUBLE DE CLÉ") ? cle.prix : cle.prix_akl;
        document.getElementById('recap-cle').innerHTML = `
            <table>
                <tr><td><b>Véhicule:</b></td><td>${cle.marque}</td></tr>
                <tr><td><b>Type:</b></td><td>${cle.type_cle}</td></tr>
                <tr><td><b>Prix:</b></td><td><b style="color:var(--success); font-size:18px;">${prix} €</b></td></tr>
            </table>`;
    }

    function ouvrirFormulaire() { actualiserPrixRecap(); changerPage('formulaire'); }

    function envoyerWhatsApp() {
        const cle = catalogue.find(c => String(c.id) === String(idChoisi));
        const tech = document.getElementById('f-tech').value;
        const mission = document.getElementById('f-mission').value;
        const prix = (mission === "DOUBLE DE CLÉ") ? cle.prix : cle.prix_akl;
        const telTech = (tech === "OLIVIER") ? "33600000000" : "33611111111"; 

        const texte = `🚀 *MISSION EXPRESS MB - ${tech}* \n\n` +
                      `📍 *MISSION:* ${mission}\n` +
                      `👤 *CLIENT:* ${document.getElementById('f-client').value}\n` +
                      `🚗 *IMMAT:* ${document.getElementById('f-immat').value}\n` +
                      `📱 *TEL:* ${document.getElementById('f-tel').value}\n\n` +
                      `🔑 *VÉHICULE:* ${cle.marque} ${cle.type_cle}\n` +
                      `💰 *PRIX:* ${prix}€\n\n` +
                      `🖼 *IMAGE:* ${cle.image}`;

        window.open(`https://wa.me/${telTech}?text=${encodeURIComponent(texte)}`, '_blank');
    }

    async function uploadPhoto(input) {
        if (!input.files[0]) return;
        document.getElementById('up-status').innerText = "⏳ Upload...";
        const fd = new FormData();
        fd.append('file', input.files[0]);
        fd.append('upload_preset', PRESET);
        try {
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const data = await res.json();
            tempURL = data.secure_url;
            document.getElementById('up-status').innerText = "✅ Prêt";
        } catch (err) { document.getElementById('up-status').innerText = "❌ Erreur"; }
    }

    async function saveCle() {
        const data = {
            action: "add",
            id: "ID-" + Date.now(),
            marque: document.getElementById('a-marque').value.toUpperCase().trim(),
            type_cle: document.getElementById('a-type').value.trim(),
            type_puce: document.getElementById('a-puce').value.trim(),
            prix: document.getElementById('a-prix').value,
            prix_akl: document.getElementById('a-prix_akl').value,
            image: tempURL || ""
        };
        await fetch(SHEET_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(data)});
        alert("Enregistré !");
        location.reload();
    }

    function initTableAdmin() {
        const div = document.getElementById('liste-admin');
        div.innerHTML = '<table>' + catalogue.slice(0,10).map(c => `
            <tr><td><img src="${c.image}" class="img-mini"></td><td>${c.marque}</td></tr>
        `).join('') + '</table>';
    }

    window.onload = chargerDonnees;
</script>
</body>
</html>
